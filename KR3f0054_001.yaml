body:
  text: 少廣補遺海寧陳世仁撰少廣補遺第一篇凖本章平立方員開三角及諸尖一十二法一平尖置倍實平方帶一縱開之得本數之底數與其徑數二立尖置六倍實立方法開之内闕一縱所得之數溢於本數之底與徑數一數三倍尖除原實末必五數進一十除之得本數之底數四方尖尖内諸自乗數依根數序次相併置三倍實先開立方次以立方根開平方一半平方一次除半方根得本數之徑數與其底數五再乗尖尖内諸立方依根數序次相併置實二除之於除得數内復減原實平方開之繼以開得數為實帶一縱方開之得原數之底數從底數逆數至尖數偶者得底所對之前數數竒者得自尖及底之中數中數與底相乘對數加一五數於數之次亦與底相乘所得數為本數徑數六抽竒平尖置實以帶一縦方開之得本數徑數亦得本數逆數至尖所對之前數以得本數底數七抽偶平尖置實平方法開之得本數徑數亦得本數逆數至尖自尖數至底之中數以得本數底數八抽偶數立尖本尖内層數及層内諸數偶者盡去之抽竒法反之以前方尖法開之得本數徑數亦得本數自尖數至底之中數以得本數底數九抽竒數立尖三倍置實立方法開之闕一縦以所得數減一得本數徑數亦得本數逆數至尖所對之前數因得本數底數十抽竒偶數方尖前立尖法開之得本數底數以底數逆數至尖得自尖及底之中數或平分數因得本數徑數十一抽偶再乘尖二除原實闕半縦平方法開之方之所得之數即得徑數平尖抽偶法收之得本數之底數十二抽竒再乘尖二除原實平方法開之方之所得之數即徑數平尖抽竒法收之得自底至尖一之中分數倍之得本數之底數少廣補遺第二篇開抽竒抽偶立尖一本尖内層數偶者去之置原數十之而加二為實立方帶平方法開之次除半平方闕一縦所得數溢於本數底倍於本數徑各一數二本尖諸層内數偶者去之原數就位十之而加五為實立方法開之所餘數及半方根者五除方減一即本數之底與徑數立方帶平方法開之所餘數及半平方又半方根者五除方得本數徑數復減一即本數底數三本尖内層數竒者去之一十二倍置實立方帶平方法除之餘實就方根増一數取縦其方之根視本數底數及本數徑倍數各溢一數其縦之限視本數徑數及本數底半數各朒一數四本尖諸層内數竒者去之原數就位十之而加五為實立方法開之闕一縦者所得數減一以五除之即本數之底與徑數立方帶平方法開之所餘數及半平方又半方根者五除方得本數底數復減一即本數徑數少廣補遺第三篇準本章帶縦諸方開三角及諸尖之半積為三角帶一鈍角形諸尖先得徑數以法算得底數一平尖徑之半平方加半縱減原實為正實以徑除正實得數徑數加之二抽竒平尖徑之平方加一縦減原實為正實徑除正實得數倍徑加之三抽偶平尖徑之方減原實為正實倍徑除正實得數徑數加之五除減一取之四立尖徑之立方一平方三及倍徑為數六而一之減原實為正實徑竒者徑除正實得數次置徑加一而二除之為半平方加半縦併徑除正實之數半平方加半縦法開之復置徑減一亦二除之與開得數併之徑耦者半徑除正實得數次置徑二除之而加一為平方并半徑除正實之數平方法開之復置徑二除之減一與開得數併之五方尖諸數自乗依根數序次相并四因原數為正實置徑倍之取其立方與三平方及又倍徑為數六而一之減先得正實為次得正實徑除次得正實得數以徑之加一為平方併之方法開之開得數復置徑減一相并二除之少廣補遺第四篇開三角及諸尖之半積先得徑數以法算得底數一抽偶立尖本尖内層數偶者去之置徑倍之取其方與立方又半平方闕一縦為數一十二而一之減原實為正實徑竒者徑除正實得數以徑之半平方加半縦并之半平方加半縦法開之開得數復置徑減一并之徑偶者半徑除正實得數徑之加一縦方并之加一縦方法開之開得數置徑減一并之二抽偶立尖之二本尖内層數及諸層内數偶者皆去之置徑倍之取其立方與三平方及又倍徑為數二十四而一之減原實為正實徑竒者以徑除正實得數次置徑加一而二除之為平方并徑除正實之數方法開之開得數五除之減一與徑之減一之數并之徑偶者半徑除正實得數次置徑二除之又置徑二除之而加一各為方以并半徑除正實之數復減一而二除之帶一縦方開之開得數五除之而加一與徑之減二之數併之三抽竒立尖本尖内層數竒者去之置徑倍之而益一取其方與立方為數復置徑倍之而益二與徑之減一相乘得數併之一十二而一之減原實為正實徑竒者以徑除正實得數以徑之益一數為半平方帶半縦并之半方帶半縦法開之開得數徑之減一并之徑偶者半徑除正實得數以徑之益一數為帶一縦方并之帶一縦方法開之開得數以徑之減一并之四抽竒立尖之二本尖内層數及諸層内數竒者皆去之以徑之立方及三平方與倍徑為數三而一之減原實為正實徑竒者以徑除正實得數次置徑加一而二除之為帶一縦方并徑除正實之數帶一縦方開之開得數二因之復置徑減一并之徑偶者半徑除正實得數次置徑二除之而加一為兩平方併半徑除正實之數減二而以二除之帶二縦方法開之開得數復二因而以徑加之五抽竒偶方尖諸自乗數依根數竒偶序次相并置徑倍之取其立方與三平方及又倍徑為數六而一之減原實為正實徑除正實得數次置徑加一為平方并之方法開之開得數置徑減一并之少廣補遺第五篇開抽偶立失之半積合失内竒偶諸層取層内數偶者去之先得徑數以法算得底數其一得徑偶徑之立方與三平方及倍徑并之一十二而一之減原實為正實以半徑除正實得數復分半徑竒偶御之半徑竒者置半徑加一為方而二除之以并半徑除正實之數復二除之平方開之方之所得之數五除減一與半徑減一之數并之半徑偶者置徑四除之復置徑四除之而加一各為方以并半徑除正實之數減一而二除之帶一縦方開之方之所得之數五除減一與半徑并之如得正實之後或半徑除之不盡與雖盡而并别數平方帶一縦方開之不得者設别法如下條如前取徑之立方與三平方及倍徑并之一十二而一之復置徑益二而二除之取其數為平方減一與前數并之減原實為正實半徑除正實得數分半徑之竒偶御之半徑偶者置徑四除之而益一為平方以半徑除正實之半并之平方開之開得之數五除減一與半徑并之半徑竒者置半徑益三而二除之為方復置半徑益三而二除之轉減一為方合之以并半徑除正實之數減一而二除之帶一縦方開之方之所得之數五除減一與半徑益一之數并之其一得徑竒置徑減三而取其倍數及其立方與三平方并之六而一之減原實之倍數為正實置徑減一而二除之為法分法之竒偶御之法竒者法除正實得數有餘實之不及法者别存之次置法減一為方并法除正實之數以方開之餘實之不及方者法因之而折半若前有剰實者亦折半并之以平方開之偶者法除正實得數有餘實之不及法者别存之次置法二除之復置法二除之而減一各為方倍之以并法除正實之數減一而平方開之餘實之不及方者法因之而折半如前有剰實者亦折半并之以平方開之凡餘實因半法不可方者前一方所商未善也退方根别商之餘實之方二因之而減一為正方與前方較其贏絀若正方絀者徑之減一之數并之也其絀以法之加二其贏以法為準少廣補遺第六篇開抽竒立尖之半積合尖内竒偶諸層取層内數竒者去之先得徑數以法算得底數其一得徑偶置半徑之立方與三平方及全徑并而十之一十五而一之以其數減原實為正實半徑除正實得數分半徑之竒偶御之半徑竒者置半徑加一而二除之為帶一縦方倍之并半徑除正實之數復加倍以帶二縦方開之開得數置半徑減一并之半徑偶者置徑四分之為帶一縦方復置徑四分之而加一亦為帶一縦方并半徑除正實之數皆倍之平方開之若原徑過四以上者置徑減四而二除之數并之上法如有不合或得正實之後半徑除之不盡與雖盡而并别數平方帶二縦方開之不得者設别法如下條置半徑之立方與三平方及全徑并而十之一十五而一之復置半徑益一為帶一縦方并之損二為數以減原實為正實以半徑除半正實得數分半徑之竒偶御之半徑竒者置半徑加一而二除之復加一而為平方并半徑除半正實之數皆四因之平方開之開得數半徑減一并之半徑偶者置全徑四除之益一為帶一縦方并半徑除半正實之數皆四因之帶二縦平方開之開得數半徑并之其一得徑竒置徑減三折半而取其倍數及其立方與三平方并而十之一十五而一之減原實為正實復置徑減一折半為法視法之竒偶分御之法竒者以半法除正實得數有餘實之不及法者别存之次置法減一為帶二縦方并之帶二縦方法開之餘實之不及方者倍法因之若前有剰實者四因併入而開帶二縦方其視前方贏絀之數法之加一為率法偶者半法除正實得數有餘實之不及法者别存之次置半法與半法之減一各為帶一縦方加倍并之平方法開之其餘實之不及方者倍法因之若前有剰實者四因併入而開帶二縦方其視前方贏絀之數絀者以法之加二贏者以法為率凡餘實因倍法不可為帶二縦方或為之不及率者前方所商未善也退方根别商之末方較前方絀者置徑之減一并之少廣補遺第七篇準本章多乘方以立尖形律餘尖得四法一方尖準立尖如數一一四一四九一十二倍置實帶一縦平方法開之開得數益一復方之所得數溢於本數之底與徑一數二抽偶方尖準立尖三倍置實闕半縦平方開之帶一縦方法收之得本數底加一以二除之之數與本數徑數三抽竒方尖準立尖三倍置實帶一縦平方法開之開得數益一復方之得本數底二除益一與本數徑益一數四立尖還準立尖如數一一一二一一二一二三六倍置實帶一縦方開之開得數益一倍之仍除帶一縦方得本數底與本數徑溢一數少廣補開尖法設如第一準本章平立方圓開三角及諸尖計一十二條平尖設如原數六倍數一十二帶一縦方根三尖之實一二三立尖設如原數十六因數六十闕一縦立方根四減一得三尖之實一一二一二三倍尖設如原數七二除數三五末五進一十除得四尖之實一二四方尖設如原數十四三因數四十二立方二十七平方九半平方四五半方根一五尖之實一四九再乘尖設如原數三十六二除數十八内復減原實餘一四四平方根十二帶一縦方收得三三數逆至尖得中數二二乘三得六尖之實一八二十七再乘尖又設如原數一百二除數五十復減原實餘四平方根二十𢃄一縦方收得四四數逆至尖得對數二加五數於對數之次得二五四因二五得十尖之實一八二十七六十四抽竒平尖設如原數十二𢃄一縦方根三對數三全數六尖之實二四六抽偶平尖設如原數九平方根三中數三全數五尖之實一三五抽偶數立尖原註本尖内層數及層内諸數偶者去之設如原數十四方尖法開之得三中數三全數五尖之實一一三一三五抽竒數立尖原註尖内層數及層内諸數竒者去之設如原數二十三因數六十闕一縦立方根四四減一得三對數三全數六尖之實二二四二四六抽竒偶數方尖設如原數三十五六因數二百一十闕一縦立方根六六減一得五全數五中數三尖之實一九二十五又設如原數五十六