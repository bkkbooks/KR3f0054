body:
  text: 少廣補遺天文算法類二算書之屬提要臣等謹案少廣補遺一卷國朝陳世仁撰世仁海寧人康熙乙未進士其書以一面尖堆及方底三角底六角底尖堆各半堆等題分為十二法後有抽竒抽偶諸目蓋堆垜之法也按堆垜乃少廣中之一術與尖錐體相似而實不同蓋堆體臺體外平而中實堆垜為衆體所積面有峻峭中多空隙故二法相較煩簡頓殊古少廣中僅具以邊數層數求積數法亦未有解其故者至以積求邊數層數之法則未備焉又其為用甚少故算家率略而不詳世仁有見於此専取堆垜諸形反覆相求各立一法雖圖說未具不能使學者窺其立法之意而於少廣之遺法引伸觸類實於數學有禆不可以其一隅而少之也乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a30826fa87fac69f24f6145a53fd1611761722f96a110c13ee65e73bb1470473
